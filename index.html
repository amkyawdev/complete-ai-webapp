<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmkyawDev AI WebApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" :class="{'is-clipped': isMenuOpen}">
    
    <!-- Desktop Sidebar -->
    <aside class="sidebar is-desktop" :class="{'is-active': isMenuOpen}">
        <div class="sidebar-header">
            <p class="title is-4 has-text-white">
                <i class="fas fa-robot"></i> AmkyawDev
            </p>
            <p class="subtitle is-6 has-text-grey-light">AI WebApp</p>
        </div>
        
        <nav class="sidebar-menu">
            <a href="pages/main.html" class="sidebar-item" :class="{'is-active': currentPage === 'main'}">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="pages/chat.html" class="sidebar-item" :class="{'is-active': currentPage === 'chat'}">
                <i class="fas fa-comments"></i>
                <span>Chat</span>
            </a>
            <a href="pages/endpoint.html" class="sidebar-item" :class="{'is-active': currentPage === 'endpoint'}">
                <i class="fas fa-plug"></i>
                <span>API Tester</span>
            </a>
            <a href="pages/dashboard.html" class="sidebar-item" :class="{'is-active': currentPage === 'dashboard'}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="pages/collections.html" class="sidebar-item" :class="{'is-active': currentPage === 'collections'}">
                <i class="fas fa-folder"></i>
                <span>Collections</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <!-- Theme Toggle -->
            <div class="theme-toggle">
                <button class="theme-btn" @click="toggleTheme()" :title="theme === 'light' ? 'Dark Mode' : 'Light Mode'">
                    <i class="fas" :class="theme === 'light' ? 'fa-moon' : 'fa-sun'"></i>
                </button>
            </div>
            <div class="language-switcher">
                <button class="button is-small" :class="lang === 'mm' ? 'is-primary' : 'is-dark'" @click="setLang('mm')">🇲🇲 မြန်မာ</button>
                <button class="button is-small" :class="lang === 'eng' ? 'is-primary' : 'is-dark'" @click="setLang('eng')">🇬🇧 English</button>
            </div>
        </div>
    </aside>

    <!-- Mobile Header -->
    <header class="mobile-header is-hidden-desktop">
        <button class="hamburger-btn" @click="toggleMenu()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <p class="title is-5">
            <i class="fas fa-robot"></i> AmkyawDev
        </p>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-overlay is-hidden-desktop" :class="{'is-active': isMenuOpen}" @click="closeMenu()"></div>

    <!-- Mobile Menu -->
    <nav class="mobile-menu is-hidden-desktop" :class="{'is-open': isMenuOpen}">
        <div class="mobile-menu-header">
            <p class="title is-4 has-text-white">
                <i class="fas fa-robot"></i> AmkyawDev
            </p>
            <button class="close-btn" @click="closeMenu()" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="mobile-menu-items">
            <a href="pages/main.html" class="mobile-menu-item" @click="closeMenu()">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="pages/chat.html" class="mobile-menu-item" @click="closeMenu()">
                <i class="fas fa-comments"></i>
                <span>Chat</span>
            </a>
            <a href="pages/endpoint.html" class="mobile-menu-item" @click="closeMenu()">
                <i class="fas fa-plug"></i>
                <span>API Tester</span>
            </a>
            <a href="pages/dashboard.html" class="mobile-menu-item" @click="closeMenu()">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="pages/collections.html" class="mobile-menu-item" @click="closeMenu()">
                <i class="fas fa-folder"></i>
                <span>Collections</span>
            </a>
        </div>
        
        <div class="mobile-menu-footer">
            <div class="language-switcher">
                <button class="button is-small" :class="lang === 'mm' ? 'is-primary' : 'is-dark'" @click="setLang('mm')">🇲🇲 မြန်မာ</button>
                <button class="button is-small" :class="lang === 'eng' ? 'is-primary' : 'is-dark'" @click="setLang('eng')">🇬🇧 English</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" :class="{'with-sidebar': !isMobile()}">
        <div class="welcome-container">
            <section class="hero is-primary is-medium">
                <div class="hero-body">
                    <div class="container has-text-centered">
                        <p class="title is-1">
                            <i class="fas fa-robot"></i>
                        </p>
                        <p class="title is-2" x-text="greeting"></p>
                        <p class="subtitle" x-text="subtitle"></p>
                        <div class="buttons is-centered">
                            <a href="pages/main.html" class="button is-large is-white is-outlined">
                                <span class="icon"><i class="fas fa-rocket"></i></span>
                                <span x-text="getLabel('start')"></span>
                            </a>
                            <a href="pages/chat.html" class="button is-large is-light">
                                <span class="icon"><i class="fas fa-comments"></i></span>
                                <span x-text="getLabel('chat')"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
            
            <section class="section">
                <div class="container">
                    <div class="columns is-multiline">
                        <template x-for="feature in features" :key="feature.id">
                            <div class="column is-4">
                                <div class="card feature-card">
                                    <div class="card-content">
                                        <div class="icon-container">
                                            <i :class="feature.icon"></i>
                                        </div>
                                        <p class="title is-4" x-text="feature.title"></p>
                                        <p class="subtitle is-6" x-text="feature.description"></p>
                                    </div>
                                    <footer class="card-footer">
                                        <a :href="feature.link" class="card-footer-item">
                                            <span x-text="getLabel('open')"></span>
                                            <i class="fas fa-arrow-right ml-2"></i>
                                        </a>
                                    </footer>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Settings Dialog -->
    <div class="dialog-overlay" :class="{'is-active': showSettings}" @click.self="showSettings = false">
        <div class="dialog-box" role="dialog" aria-modal="true">
            <header class="dialog-header">
                <p class="title is-5" x-text="getLabel('settings')"></p>
                <button class="delete" aria-label="close" @click="showSettings = false"></button>
            </header>
            <div class="dialog-content">
                <div class="field">
                    <label class="label" x-text="getLabel('language')"></label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select x-model="lang" @change="saveSettings()">
                                <option value="mm">🇲🇲 မြန်မာ</option>
                                <option value="eng">🇬🇧 English</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label class="label" x-text="getLabel('theme')"></label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select x-model="theme" @change="saveSettings()">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                                <option value="auto">Auto</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="dialog-footer">
                <button class="button is-primary" @click="showSettings = false" x-text="getLabel('close')"></button>
            </footer>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
